name: Build data & deploy site

# Auto-updates the Driver-vs-Car tool. The pipeline auto-discovers completed
# rounds, so no manual edits are needed after a race — the weekly tick (and any
# push to the app/pipeline) regenerates the JSON and redeploys.
on:
  schedule:
    - cron: '0 6 * * 1' # 06:00 UTC every Monday (after a race weekend)
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'src/**'
      - 'scripts/build_site_data.py'
      - 'scripts/build_decomp_data.py'
      - 'f1-performance-decomposition/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: write # to commit regenerated web/public/data
  pages: write
  id-token: write

# Never run two deploys at once; let the latest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      # Persist the FastF1 cache between runs so each build only fetches the
      # newest sessions. restore-keys falls back to the most recent cache.
      - name: Restore FastF1 cache
        uses: actions/cache@v4
        with:
          path: fastf1_cache
          key: fastf1-${{ github.run_id }}
          restore-keys: |
            fastf1-

      - name: Build site data
        run: python scripts/build_site_data.py

      # Decomposition JSON for the web flagship; runs after season.json (which it
      # reads for round identity) and before the commit step so the data ships.
      - name: Build decomposition data
        run: python scripts/build_decomp_data.py

      # Race-win decomposition JSON (the new flagship). Independent of season.json.
      - name: Build race-win decomposition data
        run: python scripts/build_race_decomp_data.py

      # Commit the regenerated JSON if (and only if) it changed, so the repo
      # stays the source of truth and the site builds even when FastF1 is down.
      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: refresh site JSON [skip ci]"
            git push
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build site
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
